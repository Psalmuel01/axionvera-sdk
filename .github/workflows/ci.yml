name: CI Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Fails the build if "high" or "critical" vulnerabilities are found
      - run: npm audit --audit-level=high